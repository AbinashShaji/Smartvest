<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Admin - SmartVest{% endblock %}</title>
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <!-- CSS -->
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    {% block head %}{% endblock %}
</head>
<body>
    <div class="app-container">
        <!-- Sidebar -->
        <aside class="sidebar" style="border-right-color: rgba(255,255,255,0.05); background: #050505;">
            <a href="/admin/dashboard" class="sidebar-logo">
                SV<span style="color: #fff; opacity: 0.5;">_ADMIN</span>
            </a>
            
            <ul class="nav-menu">
                <li class="nav-item">
                    <a href="/admin/dashboard">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path><polyline points="9 22 9 12 15 12 15 22"></polyline></svg>
                        <span>Admin Console</span>
                    </a>
                </li>
                <li class="nav-item">
                    <a href="/admin/users">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"></path><circle cx="9" cy="7" r="4"></circle><path d="M23 21v-2a4 4 0 0 0-3-3.87"></path><path d="M16 3.13a4 4 0 0 1 0 7.75"></path></svg>
                        <span>User Management</span>
                    </a>
                </li>
                <li class="nav-item">
                    <a href="/admin/feedback">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"></path></svg>
                        <span>Feedback Log</span>
                    </a>
                </li>
                <li class="nav-item">
                    <a href="/admin/reviews">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"></polygon></svg>
                        <span>Review Control</span>
                    </a>
                </li>
                <li class="nav-item">
                    <a href="/admin/market">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="1" x2="12" y2="23"></line><path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"></path></svg>
                        <span>Market Matrix</span>
                    </a>
                </li>
            </ul>

            <div style="margin-top: auto;">
                <a href="/dashboard" class="btn-premium btn-secondary" style="width: 100%; font-size: 0.8rem; margin-bottom: 12px;">Back to App</a>
                <button onclick="API.logout().then(() => window.location.href='/')" class="btn-premium" style="width: 100%; font-size: 0.8rem; background: #fff; color: #000;">Logout Admin</button>
            </div>
        </aside>

        <!-- Main Content Area -->
        <main class="main-content">
            <header class="top-nav">
                <div style="margin-right: auto;">
                    <h2 style="font-size: 1.2rem; display: flex; align-items: center; gap: 8px;">
                        <span style="width: 8px; height: 8px; background: #fff; border-radius: 50%;"></span>
                        {% block page_title %}Admin Overview{% endblock %}
                    </h2>
                </div>
                <div class="glass-card" style="padding: 4px 12px; font-size: 0.75rem; font-weight: 700;">SYSTEM STATUS: ONLINE</div>
            </header>

            <section class="content-body">
                {% block content %}{% endblock %}
            </section>
        </main>
    </div>

    <!-- Scripts -->
    <script src="{{ url_for('static', filename='js/api.js') }}"></script>
    <script src="{{ url_for('static', filename='js/app.js') }}"></script>
    {% block scripts %}{% endblock %}
</body>
</html>
